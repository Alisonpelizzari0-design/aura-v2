<!-- ============================================================
     AURA — maison.html  (fragment SPA)
     Maison — système de cartes façon Vision Board :
     - 3 catégories fixes : Pièces / Projets / Équipements
     - Cartes créables librement à l'intérieur de chaque catégorie
     - Carte Pièce : tâches récurrentes + checklist désencombrement
     - Carte Projet : statut, budget, progression
     - Carte Équipement : date d'achat, garantie
     - Zone de la semaine (FlyLady) : rotation automatique qui met
       en avant une pièce différente chaque semaine
     ============================================================ -->

<style>
.mai-hero {
  background:linear-gradient(135deg,#EFF6FF 0%,#F0FDFA 50%,#FFF7ED 100%);
  border:1px solid var(--bl-b); border-radius:var(--r-xl); padding:1.5rem;
  position:relative; overflow:hidden;
}
.mai-hero-top { display:flex; align-items:center; gap:1.25rem; flex-wrap:wrap; margin-bottom:1.125rem; }
.mai-hero-icon {
  width:54px; height:54px; border-radius:16px; background:linear-gradient(135deg,#93C5FD,#1E40AF);
  display:flex; align-items:center; justify-content:center; font-size:24px; flex-shrink:0;
  box-shadow:0 8px 20px rgba(30,64,175,.3); color:#fff;
}
.mai-hero-label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.6px; color:#1E40AF; }
.mai-hero-title { font-size:18px; font-weight:800; color:#1E3A8A; margin-top:2px; }
.mai-progress-badge { margin-left:auto; display:flex; align-items:center; gap:10px; background:rgba(255,255,255,.7); border-radius:14px; padding:.625rem 1rem; flex-shrink:0; }
.mai-progress-ring { position:relative; width:44px; height:44px; }
.mai-progress-ring-text { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:800; color:#1E40AF; }
.mai-progress-label { font-size:11px; font-weight:700; color:#1E40AF; }
.mai-progress-sub { font-size:9.5px; color:#1D4ED8; margin-top:1px; }

/* Zone de la semaine — bandeau FlyLady */
.mai-zone-box { background:rgba(255,255,255,.65); border:1px solid rgba(30,64,175,.18); border-radius:var(--r-lg); padding:.875rem 1.125rem; display:flex; align-items:center; gap:10px; cursor:pointer; transition:background .15s; }
.mai-zone-box:hover { background:rgba(255,255,255,.85); }
.mai-zone-icon { font-size:22px; flex-shrink:0; }
.mai-zone-text { font-size:12.5px; color:#1E3A8A; font-weight:600; flex:1; }
.mai-zone-text strong { font-weight:800; }
.mai-zone-arrow { font-size:12px; color:#1E40AF; }

/* Chips de filtre par catégorie */
.mai-cat-bar { display:flex; gap:6px; overflow-x:auto; padding-bottom:2px; }
.mai-cat-chip { display:flex; align-items:center; gap:6px; padding:7px 13px; border-radius:20px; border:1.5px solid var(--bd2); background:var(--white); cursor:pointer; transition:all .15s; flex-shrink:0; font-size:11.5px; font-weight:700; white-space:nowrap; }
.mai-cat-chip:hover { transform:translateY(-1px); }
.mai-cat-chip.active { box-shadow:0 0 0 2px currentColor; }
.mai-cat-count { font-size:9.5px; padding:1px 6px; border-radius:8px; background:rgba(0,0,0,.06); margin-left:2px; }

/* Canvas de cartes */
.mai-canvas { display:grid; grid-template-columns:repeat(4,1fr); gap:1rem; }
.mai-card { border-radius:18px; overflow:hidden; cursor:pointer; transition:all .2s; position:relative; aspect-ratio:3/4; display:flex; flex-direction:column; border:1px solid var(--bd); }
.mai-card:hover { transform:translateY(-4px) rotate(-0.3deg); box-shadow:0 16px 36px rgba(0,0,0,.14); }
.mai-card.featured { box-shadow:0 0 0 3px var(--bl); }
.mai-card-visual { flex:1; position:relative; display:flex; align-items:center; justify-content:center; font-size:48px; overflow:hidden; }
.mai-card-visual::after { content:''; position:absolute; inset:0; background:linear-gradient(180deg, rgba(0,0,0,0) 35%, rgba(0,0,0,.55) 100%); }
.mai-card-cat-badge { position:absolute; top:9px; left:9px; z-index:2; font-size:9px; font-weight:800; padding:3px 9px; border-radius:8px; backdrop-filter:blur(4px); color:#fff; }
.mai-card-featured-badge { position:absolute; top:9px; right:9px; z-index:2; font-size:9px; font-weight:800; padding:3px 9px; border-radius:8px; background:rgba(30,64,175,.9); color:#fff; }
.mai-card-progress-ring { position:absolute; top:7px; right:7px; z-index:2; width:32px; height:32px; }
.mai-card-progress-text { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:800; color:#fff; }
.mai-card-body { position:absolute; bottom:0; left:0; right:0; z-index:2; padding:.75rem .875rem; }
.mai-card-title { font-size:13px; font-weight:800; color:#fff; line-height:1.25; text-shadow:0 1px 4px rgba(0,0,0,.3); }
.mai-card-sub { font-size:10px; font-weight:700; color:rgba(255,255,255,.9); margin-top:3px; display:flex; align-items:center; gap:4px; }
.mai-card-sub.urgent { color:#FCA5A5; }
.mai-card-sub.done { color:#86EFAC; }

.mai-add-card { border:1.5px dashed var(--bd2); border-radius:18px; aspect-ratio:3/4; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; cursor:pointer; transition:all .15s; background:var(--bg); }
.mai-add-card:hover { border-color:var(--bl); background:var(--bl-l); border-style:solid; }
.mai-add-card i { font-size:26px; color:var(--t3); }
.mai-add-card span { font-size:12px; color:var(--t3); font-weight:700; text-align:center; padding:0 .5rem; }

.mai-empty { text-align:center; padding:3rem 1rem; color:var(--t3); grid-column:1/-1; }
.mai-empty-icon { font-size:36px; margin-bottom:.75rem; opacity:.6; }

/* Modal — sections conditionnelles selon le type de carte */
.mai-modal-visual-preview { height:120px; border-radius:14px; margin-bottom:1rem; display:flex; align-items:center; justify-content:center; font-size:46px; }
.mai-emoji-picker { display:flex; gap:6px; flex-wrap:wrap; margin-top:.625rem; }
.mai-emoji-btn { width:34px; height:34px; border-radius:var(--r-md); border:1.5px solid var(--bd2); background:var(--white); font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.mai-emoji-btn:hover, .mai-emoji-btn.sel { border-color:var(--bl); background:var(--bl-l); }
.mai-type-tabs { display:flex; gap:6px; margin-bottom:1rem; }
.mai-type-tab { flex:1; font-size:11px; font-weight:700; padding:8px; border-radius:10px; border:1.5px solid var(--bd2); background:var(--white); color:var(--t2); cursor:pointer; text-align:center; transition:all .12s; }
.mai-type-tab.sel { background:var(--bl); color:#fff; border-color:var(--bl); }
.mai-type-section { display:none; }
.mai-type-section.on { display:block; }

.mai-step-row { display:flex; align-items:center; gap:8px; margin-bottom:.5rem; }
.mai-step-row input[type=text] { flex:1; }
.mai-step-cb { width:20px; height:20px; border-radius:6px; border:1.5px solid var(--bd2); flex-shrink:0; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .12s; }
.mai-step-cb.on { background:var(--gr); border-color:var(--gr); }
.mai-step-cb.on i { color:#fff; font-size:11px; display:block; }
.mai-step-cb i { display:none; }
.mai-step-del { background:none; border:none; color:var(--t3); cursor:pointer; font-size:14px; flex-shrink:0; }

@media(max-width:900px) { .mai-canvas { grid-template-columns:repeat(3,1fr); } }
@media(max-width:768px) { .mai-canvas { grid-template-columns:1fr 1fr; } }
</style>

<script>
window.initModule = function(name) {
  if (name !== 'maison') return;
  Maison.init();
};

/* ══════════════════════════════════════════════════
   CATÉGORIES FIXES — 3 types de cartes, comme les
   sphères fixes de Vision Board, mais ici les cartes
   créées à l'intérieur définissent librement pièces,
   projets et équipements.
══════════════════════════════════════════════════ */
const MAI_CATS = {
  piece:      { name:'Pièces',      icon:'🏠', color:'#1E40AF' },
  projet:     { name:'Projets',     icon:'🔨', color:'#C2410C' },
  equipement: { name:'Équipements', icon:'📦', color:'#5B21B6' },
};
const MAI_CAT_ORDER = ['piece','projet','equipement'];
const MAI_EMOJIS = ['🏠','🛋️','🛏️','🛁','💻','🚪','🍳','🌿','🚗','🔧','🪴','📚','🧺','🪜','💡','🖼️','🧹','🛠️','📺','🚿'];

/* ══════════════════════════════════════════════════
   STORE — fusionne pièces/projets/inventaire en un
   seul tableau de cartes typées
══════════════════════════════════════════════════ */
const MaiStore = {
  _key: 'aura_maison_v1',
  _data: null,

  get() {
    if (this._data) return this._data;
    try {
      const r = localStorage.getItem(this._key);
      if (r) {
        this._data = JSON.parse(r);
        this._data.cards = this._data.cards || [];
        return this._data;
      }
    } catch(_) {}
    // Cartes de départ — équivalent des 6 pièces par défaut, migrées
    // en cartes du nouveau système plutôt qu'en structure séparée.
    this._data = {
      cards: [
        { id:1, type:'piece', name:'Salon',        emoji:'🛋️', color:'#1E40AF',
          tasks:[{text:'Passer l\'aspirateur', freq:'Hebdomadaire', doneAt:null}],
          declutter:[{text:'Trier la bibliothèque', done:false},{text:'Ranger les câbles apparents', done:false}] },
        { id:2, type:'piece', name:'Cuisine',       emoji:'🍳', color:'#C2410C',
          tasks:[{text:'Nettoyer la cuisine', freq:'Quotidien', doneAt:null}],
          declutter:[{text:'Vider les placards à épices', done:false},{text:'Nettoyer le frigo en profondeur', done:false}] },
        { id:3, type:'piece', name:'Chambre',       emoji:'🛏️', color:'#9D174D',
          tasks:[{text:'Changer les draps', freq:'Hebdomadaire', doneAt:null}],
          declutter:[{text:'Trier l\'armoire (méthode 1 an)', done:false}] },
        { id:4, type:'piece', name:'Salle de bain', emoji:'🛁', color:'#0F766E',
          tasks:[{text:'Nettoyer la salle de bain', freq:'Hebdomadaire', doneAt:null}],
          declutter:[{text:'Jeter les produits expirés', done:false}] },
        { id:5, type:'piece', name:'Bureau',        emoji:'💻', color:'#5B21B6',
          tasks:[], declutter:[{text:'Trier les papiers administratifs', done:false}] },
        { id:6, type:'piece', name:'Entrée',        emoji:'🚪', color:'#166534',
          tasks:[{text:'Vider les poubelles', freq:'Quotidien', doneAt:null}],
          declutter:[{text:'Trier les chaussures', done:false}] },
      ],
    };
    this.save();
    return this._data;
  },

  save() { localStorage.setItem(this._key, JSON.stringify(this._data)); },

  addCard(c) { const d=this.get(); c.id=d.cards.length?Math.max(...d.cards.map(x=>x.id))+1:1; d.cards.unshift(c); this.save(); return c; },
  updateCard(c) { const d=this.get(); const idx=d.cards.findIndex(x=>x.id===c.id); if(idx>=0) d.cards[idx]=c; this.save(); },
  deleteCard(id) { const d=this.get(); d.cards=d.cards.filter(x=>x.id!==id); this.save(); },

  /* ── Une tâche récurrente reste "faite" seulement pendant sa période
       de fréquence — recalculé à chaque rendu plutôt que figé. ── */
  isTaskDone(t) {
    if (!t.doneAt) return false;
    const done = new Date(t.doneAt);
    const now = new Date();
    if (t.freq === 'Quotidien') return done.toDateString() === now.toDateString();
    if (t.freq === 'Hebdomadaire') {
      const ws = new Date(now); ws.setDate(now.getDate() - ((now.getDay()+6)%7)); ws.setHours(0,0,0,0);
      return done >= ws;
    }
    if (t.freq === 'Mensuel') return done.getFullYear()===now.getFullYear() && done.getMonth()===now.getMonth();
    return true;
  },

  /* ── Progression d'une carte — varie selon le type :
       Pièce : moyenne tâches-à-jour + désencombrement fait
       Projet : champ progress direct
       Équipement : 100% si garantie encore valide, sinon 0% (visuel) ── */
  cardProgress(c) {
    if (c.type === 'projet') return c.progress || 0;
    if (c.type === 'equipement') {
      if (!c.warranty) return 0;
      return new Date(c.warranty) >= new Date() ? 100 : 0;
    }
    // piece
    const tasks = c.tasks || [];
    const declutter = c.declutter || [];
    const total = tasks.length + declutter.length;
    if (!total) return 0;
    const doneTasks = tasks.filter(t => this.isTaskDone(t)).length;
    const doneDeclutter = declutter.filter(d => d.done).length;
    return Math.round(((doneTasks + doneDeclutter) / total) * 100);
  },
};

/* ══════════════════════════════════════════════════
   ENGINE
══════════════════════════════════════════════════ */
const Maison = {
  activeFilter: null,
  editingId: null,
  cardType: 'piece',
  selectedEmoji: '🏠',
  taskRows: [],
  declutterRows: [],

  init() {
    this.renderCategoryFilters();
    this.renderCanvas();
    this.renderGlobalProgress();
    this.renderWeekZone();
    this.renderCuisineBudget();
  },

  /* ── Filtres catégorie ── */
  renderCategoryFilters() {
    const d = MaiStore.get();
    const counts = {};
    d.cards.forEach(c => { counts[c.type] = (counts[c.type]||0)+1; });

    const el = document.getElementById('mai-cat-bar');
    el.innerHTML = `
      <div class="mai-cat-chip ${this.activeFilter===null?'active':''}" style="color:#1E40AF" onclick="Maison.filterCategory(null)">
        🏡 Toutes <span class="mai-cat-count">${d.cards.length}</span>
      </div>
      ${MAI_CAT_ORDER.map(key => {
        const c = MAI_CATS[key];
        const n = counts[key] || 0;
        return `<div class="mai-cat-chip ${this.activeFilter===key?'active':''}" style="color:${c.color}" onclick="Maison.filterCategory('${key}')">
          ${c.icon} ${c.name} <span class="mai-cat-count">${n}</span>
        </div>`;
      }).join('')}`;
  },

  filterCategory(key) {
    this.activeFilter = key;
    this.renderCategoryFilters();
    this.renderCanvas();
  },

  /* ── Canvas ── */
  renderCanvas() {
    const d = MaiStore.get();
    let cards = d.cards;
    if (this.activeFilter) cards = cards.filter(c => c.type === this.activeFilter);

    const weekZone = this.getWeekZoneCard();
    const el = document.getElementById('mai-canvas');

    const cardsHtml = cards.map(c => {
      const cat = MAI_CATS[c.type] || MAI_CATS.piece;
      const pct = MaiStore.cardProgress(c);
      const isDone = pct === 100;
      const isFeatured = weekZone && c.id === weekZone.id;

      let subLabel = '', subCls = '';
      if (c.type === 'piece') {
        subLabel = isDone ? '✓ À jour' : `${pct}% fait`;
        subCls = isDone ? 'done' : '';
      } else if (c.type === 'projet') {
        const statusLabels = { todo:'À faire', progress:'En cours', done:'Terminé' };
        subLabel = statusLabels[c.status] || '';
        subCls = c.status === 'done' ? 'done' : '';
      } else if (c.type === 'equipement') {
        const isExpired = c.warranty && new Date(c.warranty) < new Date();
        subLabel = c.warranty ? (isExpired ? 'Garantie expirée' : `Garanti jusqu'au ${fmtD(c.warranty)}`) : 'Sans garantie';
        subCls = isExpired ? 'urgent' : '';
      }

      const circ = 2*Math.PI*13;
      const offset = circ - (pct/100)*circ;

      return `<div class="mai-card ${isFeatured?'featured':''}" onclick="Maison.openDetail(${c.id})">
        <div class="mai-card-visual" style="background:linear-gradient(135deg,${c.color}99,${c.color})">
          <span class="mai-card-cat-badge" style="background:${cat.color}cc">${cat.icon} ${cat.name}</span>
          ${isFeatured ? `<span class="mai-card-featured-badge">⭐ Zone semaine</span>` : `
          <div class="mai-card-progress-ring">
            <svg width="32" height="32" viewBox="0 0 32 32">
              <circle cx="16" cy="16" r="13" fill="none" stroke="rgba(255,255,255,.3)" stroke-width="3.5"/>
              <circle cx="16" cy="16" r="13" fill="none" stroke="#fff" stroke-width="3.5" stroke-dasharray="${circ.toFixed(0)}" stroke-dashoffset="${offset.toFixed(0)}" stroke-linecap="round" transform="rotate(-90 16 16)"/>
            </svg>
            <div class="mai-card-progress-text">${pct}%</div>
          </div>`}
          <span>${c.emoji||'🏠'}</span>
          <div class="mai-card-body">
            <div class="mai-card-title">${c.name}</div>
            ${subLabel ? `<div class="mai-card-sub ${subCls}"><i class="ti ti-info-circle" style="font-size:10px"></i> ${subLabel}</div>` : ''}
          </div>
        </div>
      </div>`;
    }).join('');

    el.innerHTML = cardsHtml + `<div class="mai-add-card" onclick="Maison.openAddModal()"><i class="ti ti-plus"></i><span>Nouvelle carte ✦</span></div>`;

    if (!cards.length) {
      el.innerHTML = `<div class="mai-empty"><div class="mai-empty-icon">🏡</div><div>Aucune carte dans cette catégorie encore</div></div>` + el.innerHTML;
    }
  },

  /* ── Progression globale ── */
  renderGlobalProgress() {
    const d = MaiStore.get();
    if (!d.cards.length) { _set('mai-progress-pct','0%'); _set('mai-progress-count','0 carte'); return; }
    const avg = Math.round(d.cards.reduce((s,c)=>s+MaiStore.cardProgress(c),0) / d.cards.length);
    const circ = 2*Math.PI*18;
    const offset = circ - (avg/100)*circ;
    document.getElementById('mai-progress-circle').setAttribute('stroke-dasharray', circ.toFixed(0));
    document.getElementById('mai-progress-circle').setAttribute('stroke-dashoffset', offset.toFixed(0));
    _set('mai-progress-pct', avg+'%');
    _set('mai-progress-count', `${d.cards.length} carte${d.cards.length>1?'s':''}`);
  },

  /* ── Budget cuisine remonté depuis sa vraie source ── */
  renderCuisineBudget() {
    let cui = null;
    try { cui = JSON.parse(localStorage.getItem('aura_cuisine_v2') || localStorage.getItem('aura_cuisine_v1') || '{}'); } catch(_) {}
    const spent = cui?.budget?.spent;
    _set('mai-cuisine-budget', spent !== undefined ? `${spent}€` : '—');
  },

  /* ══════════════════════════════════════════════════════════════
     ZONE DE LA SEMAINE — rotation FlyLady parmi les cartes de type
     "piece" uniquement. Calcul déterministe (semaine ISO modulo le
     nombre de pièces), aucun stockage nécessaire.
  ══════════════════════════════════════════════════════════════ */
  _isoWeekNumber(date) {
    const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
    const dayNum = d.getUTCDay() || 7;
    d.setUTCDate(d.getUTCDate() + 4 - dayNum);
    const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
    return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
  },

  getWeekZoneCard() {
    const pieces = MaiStore.get().cards.filter(c => c.type === 'piece');
    if (!pieces.length) return null;
    const weekNum = this._isoWeekNumber(new Date());
    return pieces[weekNum % pieces.length];
  },

  renderWeekZone() {
    const room = this.getWeekZoneCard();
    if (!room) {
      _set('mai-zone-name', '—');
      document.querySelector('.mai-zone-box').style.display = 'none';
      return;
    }
    _set('mai-zone-icon', room.emoji || '🏠');
    _set('mai-zone-name', room.name);
  },

  /* ── Conseils IA — analyse le canvas réel plutôt qu'un prompt générique ── */
  async suggestDeclutterAI() {
    const key = AuraStore.getGeminiKey();
    if (!key || key==='VOTRE_CLE_GEMINI') { AuraUI.showKeyWarning('declutter-ia-resp'); document.getElementById('declutter-ia-resp').style.display='block'; return; }
    const d = MaiStore.get();
    const resp = document.getElementById('declutter-ia-resp');
    resp.style.display = 'block';
    resp.innerHTML = '<span style="color:#1E40AF">✦ Génération de conseils personnalisés...</span>';

    const pieces = d.cards.filter(c=>c.type==='piece');
    const lateTasks = pieces.flatMap(p => (p.tasks||[]).filter(t=>!MaiStore.isTaskDone(t)).map(t=>`${t.text} (${p.name})`));
    const desc = lateTasks.length ? `Tâches en attente : ${lateTasks.slice(0,8).join(', ')}.` : 'Toutes les tâches récurrentes sont à jour.';

    try {
      AURA_GEMINI.API_KEY = key;
      const text = await AURA_GEMINI.call({
        system: 'Tu es un expert en désencombrement et organisation de maison (méthode FlyLady, KonMari, minimalisme).',
        prompt: `${desc} Donne-moi 3-4 conseils concrets et motivants pour avancer cette semaine, sans être écrasant. Sois chaleureux et actionnable.`,
        maxTokens: 350,
      });
      resp.innerHTML = text.replace(/\n/g,'<br>');
      earnXP(15,'Conseils maison IA','✨');
    } catch(e) {
      resp.innerHTML = '<span style="color:var(--re)">Indisponible — vérifie ta clé Gemini.</span>';
    }
  },

  /* ══════════════════════════════════════════════════════════════
     MODAL — création / édition, contenu adapté au type de carte
  ══════════════════════════════════════════════════════════════ */
  openAddModal() {
    this.editingId = null;
    this.cardType = 'piece';
    this.selectedEmoji = '🏠';
    this.taskRows = [];
    this.declutterRows = [];
    document.getElementById('mai-modal-title').innerHTML = '<i class="ti ti-plus"></i> Nouvelle carte';
    document.getElementById('mai-name').value = '';
    document.getElementById('mai-color').value = '#1E40AF';
    document.getElementById('mai-deadline').value = '';
    document.getElementById('mai-pstatus').value = 'todo';
    document.getElementById('mai-pbudget').value = '0';
    document.getElementById('mai-pprogress').value = '0';
    document.getElementById('mai-ipurchase').value = '';
    document.getElementById('mai-iwarranty').value = '';
    document.getElementById('mai-type-tabs-wrap').style.display = 'flex';
    this.setCardType('piece');
    this.renderEmojiPicker();
    this.renderTaskRows();
    this.renderDeclutterRows();
    document.getElementById('mai-modal-overlay').style.display = 'flex';
  },

  openDetail(id) {
    const c = MaiStore.get().cards.find(x => x.id === id);
    if (!c) return;
    this.editingId = id;
    this.cardType = c.type;
    this.selectedEmoji = c.emoji || '🏠';
    this.taskRows = JSON.parse(JSON.stringify(c.tasks || []));
    this.declutterRows = JSON.parse(JSON.stringify(c.declutter || []));

    document.getElementById('mai-modal-title').innerHTML = `<i class="ti ti-edit"></i> ${c.name}`;
    document.getElementById('mai-name').value = c.name;
    document.getElementById('mai-color').value = c.color || '#1E40AF';
    document.getElementById('mai-deadline').value = c.deadline || '';
    document.getElementById('mai-pstatus').value = c.status || 'todo';
    document.getElementById('mai-pbudget').value = c.budget || 0;
    document.getElementById('mai-pprogress').value = c.progress || 0;
    document.getElementById('mai-ipurchase').value = c.purchase || '';
    document.getElementById('mai-iwarranty').value = c.warranty || '';
    // Le type ne change pas une fois la carte créée — évite des données
    // orphelines (ex: une carte Pièce avec un statut de Projet).
    document.getElementById('mai-type-tabs-wrap').style.display = 'none';
    this.setCardType(c.type);
    this.renderEmojiPicker();
    this.renderTaskRows();
    this.renderDeclutterRows();

    document.getElementById('mai-modal-actions').innerHTML = `
      <button class="modal-btn primary" onclick="Maison.saveCard()">Enregistrer</button>
      <button class="modal-btn cancel" onclick="Maison.closeModal()">Fermer</button>
      <button class="modal-btn" style="background:var(--re-l);color:var(--re)" onclick="Maison.deleteCard(${id})"><i class="ti ti-trash"></i></button>
    `;
    document.getElementById('mai-modal-overlay').style.display = 'flex';
  },

  closeModal() { document.getElementById('mai-modal-overlay').style.display = 'none'; },

  setCardType(type) {
    this.cardType = type;
    ['piece','projet','equipement'].forEach(t => {
      document.getElementById(`mai-type-tab-${t}`)?.classList.toggle('sel', t===type);
      document.getElementById(`mai-section-${t}`)?.classList.toggle('on', t===type);
    });
    document.getElementById('mai-deadline-field').style.display = type === 'projet' ? 'none' : 'block';
    const defaultEmojis = { piece:'🏠', projet:'🔨', equipement:'📦' };
    if (!this.editingId) { this.selectedEmoji = defaultEmojis[type]; this.renderEmojiPicker(); this.updatePreview(); }
  },

  renderEmojiPicker() {
    const el = document.getElementById('mai-emoji-picker');
    el.innerHTML = MAI_EMOJIS.map(e => `<button class="mai-emoji-btn ${e===this.selectedEmoji?'sel':''}" onclick="Maison.selectEmoji('${e}')">${e}</button>`).join('');
    this.updatePreview();
  },
  selectEmoji(e) { this.selectedEmoji = e; this.renderEmojiPicker(); },
  updatePreview() {
    const preview = document.getElementById('mai-visual-preview');
    const color = document.getElementById('mai-color')?.value || '#1E40AF';
    preview.style.background = `linear-gradient(135deg,${color}99,${color})`;
    preview.textContent = this.selectedEmoji;
  },

  /* ── Tâches (section Pièce) ── */
  renderTaskRows() {
    const el = document.getElementById('mai-tasks-list');
    el.innerHTML = this.taskRows.map((t,i) => `
      <div class="mai-step-row">
        <input type="text" class="modal-input" value="${_escAttr(t.text)}" placeholder="Nom de la tâche..." onchange="Maison.updateTaskText(${i},this.value)">
        <select class="modal-input" style="max-width:120px" onchange="Maison.updateTaskFreq(${i},this.value)">
          <option value="Quotidien" ${t.freq==='Quotidien'?'selected':''}>Quotidien</option>
          <option value="Hebdomadaire" ${t.freq==='Hebdomadaire'?'selected':''}>Hebdo</option>
          <option value="Mensuel" ${t.freq==='Mensuel'?'selected':''}>Mensuel</option>
        </select>
        <button class="mai-step-del" onclick="Maison.removeTaskRow(${i})"><i class="ti ti-x"></i></button>
      </div>`).join('');
  },
  addTaskRow() { this.taskRows.push({text:'',freq:'Hebdomadaire',doneAt:null}); this.renderTaskRows(); },
  updateTaskText(i,val) { this.taskRows[i].text = val; },
  updateTaskFreq(i,val) { this.taskRows[i].freq = val; },
  removeTaskRow(i) { this.taskRows.splice(i,1); this.renderTaskRows(); },

  /* ── Désencombrement (section Pièce) ── */
  renderDeclutterRows() {
    const el = document.getElementById('mai-declutter-list');
    el.innerHTML = this.declutterRows.map((it,i) => `
      <div class="mai-step-row">
        <div class="mai-step-cb ${it.done?'on':''}" onclick="Maison.toggleDeclutterRow(${i})"><i class="ti ti-check"></i></div>
        <input type="text" class="modal-input" value="${_escAttr(it.text)}" placeholder="Élément à désencombrer..." onchange="Maison.updateDeclutterText(${i},this.value)">
        <button class="mai-step-del" onclick="Maison.removeDeclutterRow(${i})"><i class="ti ti-x"></i></button>
      </div>`).join('');
  },
  addDeclutterRow() { this.declutterRows.push({text:'',done:false}); this.renderDeclutterRows(); },
  toggleDeclutterRow(i) { this.declutterRows[i].done = !this.declutterRows[i].done; this.renderDeclutterRows(); },
  updateDeclutterText(i,val) { this.declutterRows[i].text = val; },
  removeDeclutterRow(i) { this.declutterRows.splice(i,1); this.renderDeclutterRows(); },

  /* ── Sauvegarde ── */
  saveCard() {
    const name = document.getElementById('mai-name')?.value?.trim();
    if (!name) { AuraUI.showToast('⚠ Donne un nom à ta carte'); return; }

    const card = {
      type: this.cardType,
      name,
      emoji: this.selectedEmoji,
      color: document.getElementById('mai-color')?.value || '#1E40AF',
      deadline: document.getElementById('mai-deadline')?.value || '',
    };

    if (this.cardType === 'piece') {
      card.tasks = this.taskRows.filter(t => t.text.trim());
      card.declutter = this.declutterRows.filter(d => d.text.trim());
    } else if (this.cardType === 'projet') {
      card.status = document.getElementById('mai-pstatus')?.value || 'todo';
      card.budget = parseFloat(document.getElementById('mai-pbudget')?.value) || 0;
      card.progress = parseInt(document.getElementById('mai-pprogress')?.value) || 0;
    } else if (this.cardType === 'equipement') {
      card.purchase = document.getElementById('mai-ipurchase')?.value || '';
      card.warranty = document.getElementById('mai-iwarranty')?.value || '';
    }

    if (this.editingId) {
      card.id = this.editingId;
      MaiStore.updateCard(card);
      AuraUI.showToast('✓ Carte mise à jour');
    } else {
      MaiStore.addCard(card);
      earnXP(10, `"${name}" ajoutée au canvas`, '🏡');
      AuraUI.showToast('✦ Nouvelle carte ajoutée');
    }

    this.closeModal();
    this.renderCanvas();
    this.renderCategoryFilters();
    this.renderGlobalProgress();
    this.renderWeekZone();
  },

  deleteCard(id) {
    if (!confirm('Supprimer cette carte ?')) return;
    MaiStore.deleteCard(id);
    this.closeModal();
    this.renderCanvas();
    this.renderCategoryFilters();
    this.renderGlobalProgress();
    this.renderWeekZone();
    AuraUI.showToast('Carte supprimée');
  },

  /* ── Toggle rapide depuis le détail (tâche/désencombrement cochée
       directement sans tout resauvegarder manuellement) ── */
  toggleTaskInDetail(idx) {
    if (!this.editingId) return;
    const t = this.taskRows[idx];
    t.doneAt = t.doneAt ? null : new Date().toISOString();
    this.renderTaskRows();
  },
};

/* ── Helpers ── */
function _set(id,val){ const e=document.getElementById(id); if(e) e.textContent=val; }
function _escAttr(s) { return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function fmtD(s){ if(!s) return '—'; try{ return new Date(s).toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'}); }catch(_){ return s; } }

if (document.readyState !== 'loading') Maison.init();
</script>
