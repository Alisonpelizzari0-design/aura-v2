<!-- ============================================================
     AURA — sante.html  (fragment SPA)
     Rubrique pratique "Santé" — suivi médical uniquement :
     - Rendez-vous médicaux (date, praticien, note)
     - Traitements en cours (nom, fréquence, note)
     - Conseils IA basés sur ce suivi réel

     Note : les anciens onglets Hydratation / Sommeil / Activité
     physique ont été retirés à la demande — trop chronophages à
     saisir au quotidien pour la valeur qu'ils apportaient. La sphère
     coaching "santé" (aura-scores.js) n'a donc plus de calcul
     automatique possible et redevient 100% manuelle dans spheres.html
     — c'est volontaire et honnête plutôt que de garder un calcul
     basé sur des données qui n'existent plus.
     ============================================================ -->

<style>
.san-hero {
  background:linear-gradient(135deg,var(--gr-l) 0%,var(--te-l) 100%);
  border:1px solid var(--gr-b); border-radius:var(--r-xl); padding:1.5rem;
  display:flex; align-items:center; gap:1.25rem; flex-wrap:wrap;
}

.med-row { display:flex; align-items:center; gap:10px; padding:.75rem .875rem; border-radius:var(--r-md); border:1px solid var(--bd); margin-bottom:.5rem; }
.med-row:last-child { margin-bottom:0; }
.med-icon-box { width:36px; height:36px; border-radius:9px; background:var(--re-l); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.med-note { font-size:10.5px; color:var(--t3); margin-top:2px; font-style:italic; }
.med-soon { font-size:10px; font-weight:700; padding:2px 8px; border-radius:9px; background:var(--am-l); color:var(--am); flex-shrink:0; }
.med-today { background:var(--re-l); color:var(--re); }

@media(max-width:768px) {
  .san-hero { flex-direction:column; align-items:flex-start; }
}
</style>

<!-- ════════════════════════════════════════════════════
     HERO
════════════════════════════════════════════════════ -->
<div class="san-hero">
  <div style="font-size:42px">🌿</div>
  <div style="flex:1;min-width:200px">
    <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#166534">Suivi médical</div>
    <div style="font-size:15px;font-weight:700;color:var(--text);margin-top:2px" id="san-summary">Aucun rendez-vous à venir</div>
  </div>
  <div style="display:flex;gap:.75rem;flex-wrap:wrap">
    <div style="text-align:center;background:rgba(255,255,255,.55);border-radius:var(--r-md);padding:.625rem .875rem">
      <div style="font-size:18px;font-weight:800;color:var(--re)" id="san-stat-rdv">0</div>
      <div style="font-size:10px;color:var(--t2)">RDV à venir</div>
    </div>
    <div style="text-align:center;background:rgba(255,255,255,.55);border-radius:var(--r-md);padding:.625rem .875rem">
      <div style="font-size:18px;font-weight:800;color:var(--bl)" id="san-stat-meds">0</div>
      <div style="font-size:10px;color:var(--t2)">Traitements suivis</div>
    </div>
  </div>
</div>

<div class="g2">

  <!-- ════════ RENDEZ-VOUS ════════ -->
  <div class="card">
    <div class="card-header">
      <span class="card-title"><i class="ti ti-stethoscope"></i> <span data-aura-edit="sante.title.1" data-aura-edit-label="Titre : Rendez-vous & rappels">Rendez-vous & rappels</span></span>
      <button class="btn-ghost" onclick="navigate('agenda')">Voir Agenda →</button>
    </div>
    <div id="medical-list"></div>
    <button class="btn-pill pu" style="width:100%;justify-content:center;margin-top:.875rem" onclick="Sante.openMedicalModal()"><i class="ti ti-plus" style="font-size:12px"></i> Ajouter un rendez-vous</button>
  </div>

  <!-- ════════ TRAITEMENTS ════════ -->
  <div class="card">
    <div class="card-header"><span class="card-title"><i class="ti ti-pill"></i> <span data-aura-edit="sante.title.2" data-aura-edit-label="Titre : Traitements en cours">Traitements en cours</span></span></div>
    <div id="meds-list"></div>
    <button class="btn-pill pu" style="width:100%;justify-content:center;margin-top:.875rem" onclick="Sante.openMedicationModal()"><i class="ti ti-plus" style="font-size:12px"></i> Ajouter un traitement</button>
  </div>

</div>

<!-- ════════ CONSEILS IA ════════ -->
<div class="card">
  <div class="card-header"><span class="card-title"><i class="ti ti-sparkles"></i> <span data-aura-edit="sante.title.3" data-aura-edit-label="Titre : Conseils IA">Conseils IA</span></span></div>
  <div class="ia-suggest-box" style="background:var(--pu-l);border:1px solid var(--pu-b);border-radius:var(--r-lg);padding:1.25rem">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:1rem">
      <div style="width:40px;height:40px;border-radius:50%;background:var(--pu);display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <i class="ti ti-sparkles" style="color:#fff;font-size:18px"></i>
      </div>
      <div>
        <div style="font-size:13px;font-weight:700;color:var(--pu-d)">Bilan suivi médical — Gemini IA</div>
        <div style="font-size:12px;color:#7C3AED">Organisation de tes rendez-vous & traitements</div>
      </div>
    </div>
    <button class="btn-primary" onclick="Sante.askIA()">
      <i class="ti ti-sparkles"></i> Analyser mon suivi médical
    </button>
    <div class="coach-resp" id="san-ia-resp"></div>
  </div>
</div>

<!-- ════════════════════════════════════════════════════
     MODAL — Nouveau rendez-vous
════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="san-medical-modal" style="display:none" onclick="if(event.target===this)Sante.closeMedicalModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-title"><i class="ti ti-stethoscope"></i> Nouveau rendez-vous</div>
    <div class="modal-field"><label class="modal-lbl">Praticien / motif</label><input class="modal-input" id="sm-med-label" placeholder="Ex: Dr Martin — dentiste"></div>
    <div class="modal-field"><label class="modal-lbl">Date</label><input class="modal-input" id="sm-med-date" type="date"></div>
    <div class="modal-field"><label class="modal-lbl">Note (optionnel)</label><input class="modal-input" id="sm-med-note" placeholder="Ex: amener carnet de santé"></div>
    <div class="modal-actions">
      <button class="modal-btn primary" onclick="Sante.saveMedical()">Ajouter</button>
      <button class="modal-btn cancel" onclick="Sante.closeMedicalModal()">Annuler</button>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════════════
     MODAL — Nouveau traitement
════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="san-medication-modal" style="display:none" onclick="if(event.target===this)Sante.closeMedicationModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-title"><i class="ti ti-pill"></i> Nouveau traitement</div>
    <div class="modal-field"><label class="modal-lbl">Nom du traitement</label><input class="modal-input" id="sm-medic-name" placeholder="Ex: Vitamine D"></div>
    <div class="modal-field"><label class="modal-lbl">Fréquence</label><input class="modal-input" id="sm-medic-freq" placeholder="Ex: 1x/jour" value="1x/jour"></div>
    <div class="modal-field"><label class="modal-lbl">Note (optionnel)</label><input class="modal-input" id="sm-medic-note" placeholder="Ex: à prendre avec un repas"></div>
    <div class="modal-actions">
      <button class="modal-btn primary" onclick="Sante.saveMedication()">Ajouter</button>
      <button class="modal-btn cancel" onclick="Sante.closeMedicationModal()">Annuler</button>
    </div>
  </div>
</div>

<script>
window.initModule = function(name) {
  if (name !== 'sante') return;
  Sante.init();
};

var SanStore = {
  _key: 'aura_sante_v1',
  _data: null,

  get() {
    if (this._data) return this._data;
    try {
      const r = localStorage.getItem(this._key);
      if (r) {
        this._data = JSON.parse(r);
        // Migration douce : si l'ancienne structure (water/sleep/activities)
        // existe encore, on la laisse de côté sans la supprimer — au cas où
        // une version antérieure de l'app y reviendrait — mais on s'assure
        // que medical/medications existent bien pour le nouveau périmètre.
        this._data.medical = this._data.medical || [];
        this._data.medications = this._data.medications || [];
        return this._data;
      }
    } catch(_) {}
    this._data = { medical: [], medications: [] };
    this.save();
    return this._data;
  },
  save() { localStorage.setItem(this._key, JSON.stringify(this._data)); },
};

var Sante = {

  init() {
    this.renderHero();
    this.renderMedical();
    this.renderMeds();
  },

  renderHero() {
    const d = SanStore.get();
    const today = new Date(); today.setHours(0,0,0,0);
    const upcoming = d.medical.filter(m => new Date(m.date) >= today).sort((a,b)=>new Date(a.date)-new Date(b.date));
    _set('san-stat-rdv', upcoming.length);
    _set('san-stat-meds', d.medications.length);

    if (!upcoming.length) {
      _set('san-summary', 'Aucun rendez-vous à venir');
    } else {
      const next = upcoming[0];
      const days = Math.ceil((new Date(next.date) - today) / 86400000);
      const when = days === 0 ? "aujourd'hui" : days === 1 ? 'demain' : `dans ${days} jours`;
      _set('san-summary', `Prochain RDV : ${next.label} — ${when}`);
    }
  },

  /* ── Rendez-vous médicaux ── */
  renderMedical() {
    const d = SanStore.get();
    const today = new Date(); today.setHours(0,0,0,0);
    const sorted = [...d.medical].sort((a,b)=>new Date(a.date)-new Date(b.date));

    document.getElementById('medical-list').innerHTML = sorted.map(m => {
      const days = Math.ceil((new Date(m.date) - today) / 86400000);
      const badge = days < 0 ? '' : days === 0 ? '<span class="med-soon med-today">Aujourd\'hui</span>' : days <= 7 ? `<span class="med-soon">J-${days}</span>` : '';
      const isSynced = !!m.fromAgendaId;
      const actionBtn = isSynced
        ? `<button style="background:none;border:none;color:var(--t3);cursor:pointer;font-size:13px" onclick="navigate('agenda')" title="Géré depuis Agenda"><i class="ti ti-calendar"></i></button>`
        : `<button style="background:none;border:none;color:var(--t3);cursor:pointer;font-size:13px" onclick="Sante.deleteMedical(${m.id})"><i class="ti ti-trash"></i></button>`;
      return `<div class="med-row">
        <div class="med-icon-box"><i class="ti ti-calendar-event" style="color:var(--re);font-size:14px"></i></div>
        <div style="flex:1">
          <div style="font-size:12.5px;font-weight:600;color:var(--text)">${m.label}${isSynced ? ' <span style="font-size:9px;font-weight:700;color:var(--bl);background:var(--bl-l);padding:1px 6px;border-radius:7px">Agenda</span>' : ''}</div>
          <div style="font-size:10.5px;color:var(--t3)">${new Date(m.date).toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'})}</div>
          ${m.note ? `<div class="med-note">${m.note}</div>` : ''}
        </div>
        ${badge}
        ${actionBtn}
      </div>`;
    }).join('') || '<div style="text-align:center;padding:1rem;color:var(--t3);font-size:12px">Aucun rendez-vous — ajoute le premier ou crée un événement "Santé" dans Agenda</div>';
  },

  openMedicalModal() {
    document.getElementById('sm-med-label').value = '';
    document.getElementById('sm-med-date').value = new Date().toISOString().slice(0,10);
    document.getElementById('sm-med-note').value = '';
    document.getElementById('san-medical-modal').style.display = 'flex';
  },
  closeMedicalModal() { document.getElementById('san-medical-modal').style.display = 'none'; },

  saveMedical() {
    const label = document.getElementById('sm-med-label')?.value?.trim();
    const date = document.getElementById('sm-med-date')?.value;
    const note = document.getElementById('sm-med-note')?.value?.trim();
    if (!label || !date) { AuraUI.showToast('⚠ Indique au moins le motif et la date'); return; }
    const d = SanStore.get();
    d.medical.push({ id: d.medical.length?Math.max(...d.medical.map(x=>x.id))+1:1, label, date, note: note||'' });
    SanStore.save();
    this.closeMedicalModal();
    this.renderMedical();
    this.renderHero();
    AuraUI.showToast('✓ Rendez-vous ajouté');
  },

  deleteMedical(id) {
    const d = SanStore.get();
    d.medical = d.medical.filter(x=>x.id!==id);
    SanStore.save();
    this.renderMedical();
    this.renderHero();
  },

  /* ── Traitements ── */
  renderMeds() {
    const d = SanStore.get();
    document.getElementById('meds-list').innerHTML = d.medications.map(m => `
      <div class="med-row">
        <div class="med-icon-box" style="background:var(--bl-l)"><i class="ti ti-pill" style="color:var(--bl);font-size:14px"></i></div>
        <div style="flex:1">
          <div style="font-size:12.5px;font-weight:600;color:var(--text)">${m.name}</div>
          <div style="font-size:10.5px;color:var(--t3)">${m.freq}</div>
          ${m.note ? `<div class="med-note">${m.note}</div>` : ''}
        </div>
        <button style="background:none;border:none;color:var(--t3);cursor:pointer;font-size:13px" onclick="Sante.deleteMed(${m.id})"><i class="ti ti-trash"></i></button>
      </div>`).join('') || '<div style="text-align:center;padding:1rem;color:var(--t3);font-size:12px">Aucun traitement — ajoute le premier</div>';
  },

  openMedicationModal() {
    document.getElementById('sm-medic-name').value = '';
    document.getElementById('sm-medic-freq').value = '1x/jour';
    document.getElementById('sm-medic-note').value = '';
    document.getElementById('san-medication-modal').style.display = 'flex';
  },
  closeMedicationModal() { document.getElementById('san-medication-modal').style.display = 'none'; },

  saveMedication() {
    const name = document.getElementById('sm-medic-name')?.value?.trim();
    const freq = document.getElementById('sm-medic-freq')?.value?.trim() || '1x/jour';
    const note = document.getElementById('sm-medic-note')?.value?.trim();
    if (!name) { AuraUI.showToast('⚠ Indique le nom du traitement'); return; }
    const d = SanStore.get();
    d.medications.push({ id: d.medications.length?Math.max(...d.medications.map(x=>x.id))+1:1, name, freq, note: note||'' });
    SanStore.save();
    this.closeMedicationModal();
    this.renderMeds();
    this.renderHero();
    AuraUI.showToast('✓ Traitement ajouté');
  },

  deleteMed(id) {
    const d = SanStore.get();
    d.medications = d.medications.filter(x=>x.id!==id);
    SanStore.save();
    this.renderMeds();
  },

  /* ── IA ── */
  async askIA() {
    const key = AuraStore.getGeminiKey();
    if (!key || key==='VOTRE_CLE_GEMINI') { AuraUI.showKeyWarning('san-ia-resp'); document.getElementById('san-ia-resp').style.display='block'; return; }
    const d = SanStore.get();
    const resp = document.getElementById('san-ia-resp');
    resp.style.display='block';
    resp.innerHTML = '<span style="color:#7C3AED">✦ Analyse de ton suivi médical...</span>';

    const today = new Date(); today.setHours(0,0,0,0);
    const upcoming = d.medical.filter(m => new Date(m.date) >= today);
    const rdvDesc = upcoming.length ? upcoming.map(m=>`${m.label} le ${m.date}`).join(', ') : 'aucun rendez-vous prévu';
    const medsDesc = d.medications.length ? d.medications.map(m=>`${m.name} (${m.freq})`).join(', ') : 'aucun traitement en cours';

    try {
      AURA_GEMINI.API_KEY = key;
      const text = await AURA_GEMINI.call({
        system: 'Tu es un assistant bienveillant qui aide à organiser un suivi médical personnel — pas un médecin, tu ne donnes aucun avis médical, seulement de l\'aide à l\'organisation et des rappels de bon sens (préparer les documents, anticiper les renouvellements...).',
        prompt: `Mes rendez-vous à venir : ${rdvDesc}. Mes traitements en cours : ${medsDesc}. Donne-moi 2-3 conseils pratiques pour bien m'organiser (ce qu'il faut anticiper, préparer, ou vérifier), en 3-4 phrases.`,
        maxTokens: 350,
      });
      resp.innerHTML = text.replace(/\n/g,'<br>');
    } catch(e) { resp.innerHTML = '<span style="color:var(--re)">Indisponible — vérifie ta clé Gemini.</span>'; }
  },
};

function _set(id,val){ const e=document.getElementById(id); if(e) e.textContent=val; }

if (document.readyState !== 'loading') Sante.init();
</script>
